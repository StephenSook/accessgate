services:
  - type: web
    name: accessgate-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn src.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ACCESSGATE_DEMO_MODE
        value: "true"
      - key: WATSONX_API_KEY
        sync: false
      - key: WATSONX_PROJECT
        sync: false
      - key: WATSONX_URL
        value: https://us-south.ml.cloud.ibm.com
    healthCheckPath: /health
